<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ==================== UTILITIES ====================
function fmt(n) { return n != null ? Number(n).toLocaleString('ko-KR') : '0'; }
function fmtW(n) { return fmt(n) + '원'; }
function fmtDate(d) { if(!d) return '-'; if(d instanceof Date) return d.toISOString().slice(0,10); return String(d).slice(0,10); }
function genId(d) { d.nextId = (d.nextId||1000)+1; return d.nextId; }
function StatIcon({bg, color, icon}) { return React.createElement('div', {className:'icon', style:{background:bg, color:color}}, React.createElement('i', {className:'fas '+icon})); }

// ==================== XLSX PARSER ====================
function parseXlsx(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
                const sheets = {};
                wb.SheetNames.forEach(name => {
                    sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, defval:null, raw:false, dateNF:'yyyy-mm-dd'});
                });
                resolve({ sheetNames: wb.SheetNames, sheets });
            } catch(err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

// Smart column mapping
const ORDER_COLUMN_MAP = {
    '발주일': 'orderDate', '발주일자': 'orderDate',
    '납입기한': 'dueDate', '납기일': 'dueDate', '납기': 'dueDate',
    '출하일': 'shipDate', '출하일자': 'shipDate',
    '업체명': 'client', '거래처': 'client', '거래처명': 'client', '고객사': 'client',
    '발주번호': 'orderNo', 'PO번호': 'orderNo',
    '업체 품명': 'clientProduct', '업체품명': 'clientProduct',
    '엘멕스텍 품명': 'product', '품명': 'product', '제품명': 'product', '엘맥스텍 품명': 'product', '엘멜스텍 품명': 'product',
    '발주수량': 'qty', '수량': 'qty',
    '로트번호': 'lotNo', '로트': 'lotNo', 'LOT': 'lotNo',
    '세금계산서 발행일자': 'invoiceDate', '세금계산서': 'invoiceDate',
    '비고': 'notes', '메모': 'notes',
    '단가': 'unitPrice', '단가(원)': 'unitPrice',
    '금액': 'amount', '합계금액': 'amount',
};

function autoMapColumns(headers) {
    const mapping = {};
    headers.forEach((h, idx) => {
        if(!h) return;
        const clean = String(h).trim();
        if (ORDER_COLUMN_MAP[clean]) {
            mapping[idx] = ORDER_COLUMN_MAP[clean];
        } else {
            for(const [key, val] of Object.entries(ORDER_COLUMN_MAP)) {
                if(clean.includes(key) || key.includes(clean)) {
                    mapping[idx] = val;
                    break;
                }
            }
        }
    });
    return mapping;
}

// ==================== BANK TRANSACTION CATEGORIZER ====================
const BANK_CATEGORIES = {
    '거래처입금': { color:'#0e9f6e', icon:'fa-building', keywords:[ '푸른기술', '에이텍', '에니텍시스', '미도리야', '와이즈', '캐논코리아', '케이더블유트레', '케이스타컴' ] },
    '자재/부품비': { color:'#e3a008', icon:'fa-cogs', keywords:[ '금영테크', '선진분말야금', '제이아이텍', '신일테크', '스마트에프앙에스', '우리종합상사', '신대성스프링', '한라스프링', '캐논스프링', '금형대금', '샤프트금형' ] },
    '외주/용역비': { color:'#7c3aed', icon:'fa-handshake', keywords:[ '이음로직스', '와이즈브러쉬' ] },
    '인건비(급여)': { color:'#1a56db', icon:'fa-users', keywords:[ '김중수급여', '이진급여', '현복자급여', '김중수', '이진', '현복자', '임유정' ] },
    '인건비(아르바이트)': { color:'#6366f1', icon:'fa-user-clock', keywords:[ '김성중', '황용운', '김영일', '알바' ] },
    '4대보험': { color:'#db2777', icon:'fa-shield-halved', keywords:[ '국민연금', '국민건강', '고용보험', '산재보험' ] },
    '세무/법무': { color:'#0891b2', icon:'fa-balance-scale', keywords:[ '김순근세무', '노옥현', '법무사' ] },
    '관리비/임대': { color:'#ea580c', icon:'fa-building-user', keywords:[ '604호', '402호', '412호', '관리비', '중계수수료', '계약금', '유리공사' ] },
    '대출/금융': { color:'#64748b', icon:'fa-university', keywords:[ '기업회전대출', '대출금상환', '이음로직스대출', '이음로직스대여', '대여금상환', '이자-' ] },
    '세금/공과금': { color:'#be123c', icon:'fa-receipt', keywords:[ '국세_', '국세조회', '지방세', '등록면허세', '관세납부', '특허등록비' ] },
    '통신/IT': { color:'#0d9488', icon:'fa-wifi', keywords:[ 'SKB', '웹케시경리나라' ] },
    '기타경비': { color:'#78716c', icon:'fa-ellipsis', keywords:[ '비씨카드', 'SMS통지', '에어컨', '전등교체', '법인차량과태료' ] },
    '지원금/환급': { color:'#16a34a', icon:'fa-hand-holding-dollar', keywords:[ '고용부일가정양', '환급', '2026년결산' ] },
    '개인입금': { color:'#a855f7', icon:'fa-user', keywords:[ '김화준', '류대수', '김경우' ] },
};

function categorizeTransaction(desc) {
    const d = desc || '';
    for(const [cat, info] of Object.entries(BANK_CATEGORIES)) {
        for(const kw of info.keywords) {
            if(d.includes(kw)) return cat;
        }
    }
    if(d.includes('이음로직스') && !d.includes('대출') && !d.includes('대여')) return '외주/용역비';
    return '기타경비';
}

// ==================== USER MANAGEMENT ====================
const DEFAULT_USERS = {
    'kimjs': { name: '김중수 (대표)', role: 'admin', password: '1234' },
    'kimkt': { name: '김국태 (이사)', role: 'admin', password: '1234' },
    'kimsj': { name: '김성중 (과장)', role: 'staff', password: '1234' },
    'hwangyw': { name: '황용운 (대리)', role: 'staff', password: '1234' },
};

function getUsers() {
    try {
        const saved = localStorage.getItem('elmax_users');
        if (saved) return JSON.parse(saved);
    } catch(e) {}
    return {...DEFAULT_USERS};
}

function saveUsers(users) {
    localStorage.setItem('elmax_users', JSON.stringify(users));
}

let USERS = getUsers();

const STAFF_RESTRICTED_PAGES = ['dashboard', 'cashflow', 'finance', 'data-init', 'users'];

function canAccess(userRole, page) {
    if (userRole === 'admin') return true;
    if (STAFF_RESTRICTED_PAGES.includes(page)) return false;
    return true;
}

// ==================== DATA STORE ====================
const STORAGE_KEY = 'elmax_dashboard_v4';

function getInitialData() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.version === 4) return parsed;
        }
    } catch(e) {}
    return getDefaultData();
}

function LoginPage({ onLogin }) {
    const [id, setId] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');

    const handleLogin = () => {
        if (!id || !password) {
            setError('ID와 비밀번호를 입력해주세요.');
            return;
        }
        const user = USERS[id];
        if (!user || user.password !== password) {
            setError('ID 또는 비밀번호가 일치하지 않습니다.');
            return;
        }
        onLogin({ id, ...user });
    };

    return (
        <div className="login-container">
            <div className="login-card">
                <div className="login-header">
                    <div className="logo">엘맥스텍</div>
                    <div className="subtitle">행정업무 대시보드</div>
                </div>
                {error && <div className="login-error">{error}</div>}
                <form className="login-form" onSubmit={(e) => { e.preventDefault(); handleLogin(); }}>
                    <div className="form-group">
                        <label>ID</label>
                        <input type="text" value={id} onChange={(e) => setId(e.target.value)} placeholder="사용자 ID 입력" />
                    </div>
                    <div className="form-group">
                        <label>비밀번호</label>
                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="비밀번호 입력" />
                    </div>
                    <button type="submit" className="btn btn-primary" style={{width:'100%', justifyContent:'center'}}>
                        <i className="fas fa-sign-in-alt"></i> 로그인
                    </button>
                </form>
                <div style={{marginTop:'16px', textAlign:'center', fontSize:'12px', color:' var(--gray)'}}>
                    <p>테스트 계정: kimjs / 1234 (관리자)</p>
                    <p>테스트 계정: kimsj / 1234 (스태프)</p>
                </div>
            </div>
        </div>
    );
}

// ==================== CASHFLOW PAGE ====================
function CashflowPage({ data }) {
    const transactions = data.bankTransactions || [];
    const categories = {};

    transactions.forEach(t => {
        const cat = categorizeTransaction(t.description);
        if (!categories[cat]) categories[cat] = { total: 0, count: 0, type: t.type };
        if (t.type === '출금') categories[cat].total += t.amount;
    });

    const income = transactions.filter(t => t.type === '입금').reduce((s,t) => s+t.amount, 0);
    const expense = transactions.filter(t => t.type === '출금').reduce((s,t) => s+t.amount, 0);
    const balance = income - expense;

    const sortedCats = Object.entries(categories).sort((a, b) => b[1].total - a[1].total);

    return (
        <div>
            <h2 style={{fontSize:'20px', fontWeight:'600', marginBottom:'16px'}}>현금흐름</h2>

            <div className="cf-summary">
                <div className="cf-box">
                    <div className="cf-label">총 입금</div>
                    <div className="cf-value positive">{fmtW(income)}</div>
                </div>
                <div className="cf-box">
                    <div className="cf-label">총 출금</div>
                    <div className="cf-value negative">{fmtW(expense)}</div>
                </div>
                <div className="cf-box">
                    <div className="cf-label">순 잔액</div>
                    <div className={`cf-value ${balance >= 0 ? 'positive' : 'negative'}`}>{fmtW(balance)}</div>
                </div>
            </div>

            <div className="card">
                <div className="card-header">
                    <h3>항목별 출금 현황</h3>
                </div>
                <div className="card-body">
                    {sortedCats.map(([cat, data]) => (
                        <div key={cat}>
                            <div className="cf-cat">
                                <div className="cf-cat-name">{cat}</div>
                                <div className="cf-cat-amount">{fmtW(data.total)}</div>
                            </div>
                            <div className="cf-cat-bar">

function StatementPage({ data, setData }) {

    const [newStatement, setNewStatement] = useState({ clientId: '', items: [] });

    const shippedOrders = (data.orders || []).filter(o => o.status === '출하완료');
    const statements = data.statements || [];
    const clients = data.clients || [];

    const handleCreateStatement = () => {
        if (!newStatement.clientId) {
            alert('거래처를 선택해주세요.');
            return;
        }
        const newId = genId(data);
        const newSt = {
            id: newId,
            statementNo: `ST${new Date().toISOString().slice(0,10).replace(/-/g, '')}${String(newId).slice(-3)}`,
            clientId: parseInt(newStatement.clientId),
            clientName: clients.find(c => c.id === parseInt(newStatement.clientId))?.name || '',
            createdDate: new Date().toISOString().slice(0,10),
            sentDate: '',
            status: '생성',
            items: shippedOrders.filter(o => o.client === clients.find(c => c.id === parseInt(newStatement.clientId))?.name).map(o => ({
                month: new Date(o.shipDate).getMonth() + 1,
                day: new Date(o.shipDate).getDate(),
                productName: o.product,
                spec: '',
                qty: o.qty,
                unitPrice: (() => { const p = (data.products||[]).find(p => o.product && (o.product.includes(p.code) || p.code.includes(o.product) || o.product.includes(p.name))); return p ? p.sellPrice : 0; })(),
                suppliedAmount: (() => { const p = (data.products||[]).find(p => o.product && (o.product.includes(p.code) || p.code.includes(o.product) || o.product.includes(p.name))); return p ? p.sellPrice * o.qty : 0; })(),
                tax: (() => { const p = (data.products||[]).find(p => o.product && (o.product.includes(p.code) || p.code.includes(o.product) || o.product.includes(p.name))); return p ? Math.round(p.sellPrice * o.qty * 0.1) : 0; })(),
                orderNo: o.orderNo || '',
            })) || [],
        };
        data.statements.push(newSt);
        setData({...data});
        setShowCreateModal(false);
        setNewStatement({ clientId: '', items: [] });

        const st = statements.find(s => s.id === stId);

            {selectedStatementId && (

                        const tTax = stItems.reduce((s, i) => s + (i.tax || 0), 0);

                                    <div>
                                        <div style={{fontWeight:'600', marginBottom:'6px', color:'var(--primary)'}}>공급자</div>
                                        <div>{data.company.name}</div>
                                        <div style={{fontSize:'11px', color:'var(--gray)'}}>사업자번호: {data.company.bizNo}</div>
                                        <div style={{fontSize:'11px', color:'var(--gray)'}}>대표: {data.company.rep}</div>
                                    </div>
                                </div>
                                <div style={{background:'var(--primary-light)', padding:'10px 16px', borderRadius:'8px', marginBottom:'16px', fontSize:'16px', fontWeight:'700'}}>
                                    합계금액: {fmtW(tTotal)}
                                </div>

                                <div className="form-row" style={{marginBottom:'12px'}}>
                                    <div className="form-group">
                                        <label>전미수잔액</label>
                                        <input type="number" value={st.prevBalance||0} onChange={(e) => { st.prevBalance = parseInt(e.target.value)||0; setData({...data}); }} />
                                    </div>
                                    <div className="form-group">
                                        <label>입금액</label>
                                        <input type="number" value={st.paidAmount||0} onChange={(e) => { st.paidAmount = parseInt(e.target.value)||0; setData({...data}); }} />
                                    </div>
                                </div>

                                <table>
                                    <thead>
                                        <tr>
                                            <th>월일</th>
                                            <th>품목명</th>
                                            <th>수량</th>
                                            <th>단가</th>
                                            <th>공급가액</th>
                                            <th>세액</th>
                                            <th>비고(PO)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stItems.map((item, idx) => (
                                            <tr key={idx}>
                                                <td style={{textAlign:'center'}}>{String(item.month||'').padStart(2,'0')}-{String(item.day||'').padStart(2,'0')}</td>
                                                <td>{item.productName}</td>
                                                <td style={{textAlign:'right'}}>{fmt(item.qty)}</td>
                                                <td style={{textAlign:'right'}}>{fmtW(item.unitPrice)}</td>
                                                <td style={{textAlign:'right'}}>{fmtW(item.suppliedAmount)}</td>
                                                <td style={{textAlign:'right'}}>{fmtW(item.tax)}</td>
                                                <td>{item.orderNo||''}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot>
                                        <tr style={{fontWeight:'600', background:'var(--gray-light)'}}>
                                            <td colSpan={2}>합계</td>
                                            <td style={{textAlign:'right'}}>{fmt(stItems.reduce((s,i)=>s+(i.qty||0),0))}</td>
                                            <td></td>
                                            <td style={{textAlign:'right'}}>{fmtW(tSupply)}</td>
                                            <td style={{textAlign:'right'}}>{fmtW(tTax)}</td>
                                            <td></td>
                                        </tr>
                                    </tfoot>
                                </table>
                                <div style={{marginTop:'12px', fontSize:'13px', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px'}}>
                                    <div style={{background:'#f9f9f9', padding:'8px', borderRadius:'4px'}}>

                                    <div style={{background:'#f9f9f9', padding:'8px', borderRadius:'4px'}}>
                                        <span style={{color:'var(--gray)'}}>총합계:</span> <b>{fmtW((st.prevBalance||0) + tTotal)}</b>

                                    <div style={{background:'#fff3f3', padding:'8px', borderRadius:'4px'}}>
                                        <span style={{color:'var(--gray)'}}>총미수잔액:</span> <b style={{color:'var(--danger)'}}>{fmtW((st.prevBalance||0) + tTotal - (st.paidAmount||0))}</b>

                                </div>
                            </div>
                        </div>
                        );
                    })}
                </div>
            )}

            {showCreateModal && (
                <div className="modal-overlay" onClick={() => setShowCreateModal(false)}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>

                            <h3>거래명세서 생성</h3>

                                <i className="fas fa-times"></i>
                            </button>

                        <div className="modal-body">
                            <div className="form-group">
                                <label>거래처 선택</label>

                                        <option key={c.id} value={c.id}>{c.name}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={() => setShowCreateModal(false)}>취소</button>
                            <button className="btn btn-primary" onClick={handleCreateStatement}>생성</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

// ==================== INVENTORY PAGE ====================
function InventoryPage({ data, setData }) {
    const [categoryFilter, setCategoryFilter] = useState('완제품');
    const [showModal, setShowModal] = useState(false);
    const [editItem, setEditItem] = useState(null);
    const [showBulkInput, setShowBulkInput] = useState(false);

    const inventory = data.inventory || [];
    const filtered = inventory.filter(i => i.category === categoryFilter);

    const categories = ['완제품', '반제품', '기본부품'];

    const handleSave = (item) => {
        if (editItem) {
            const idx = inventory.findIndex(i => i.id === editItem.id);
            if (idx >= 0) {
                inventory[idx] = { ...editItem, ...item };
            }
        } else {
            item.id = genId(data);
            inventory.push(item);
        }
        setData({...data});
        setShowModal(false);
        setEditItem(null);
    };

    const handleDelete = (id) => {
        if (confirm('삭제하시겠습니까?')) {
            const idx = inventory.findIndex(i => i.id === id);
            if (idx >= 0) inventory.splice(idx, 1);
            setData({...data});
        }
    };

    return (
        <div>
            <h2 style={{fontSize:'20px', fontWeight:'600', marginBottom:'16px'}}>재고관리</h2>

            <div className="category-tabs">
                {categories.map(cat => (
                    <button
                        key={cat}
                        className={`category-tab ${categoryFilter === cat ? 'active' : ''}`}
                        onClick={() => setCategoryFilter(cat)}
                    >
                        {cat}
                    </button>
                ))}
            </div>

            <div className="card">
                <div className="card-header">
                    <h3>{categoryFilter} 재고</h3>
                    <div style={{display:'flex', gap:'8px'}}>
                        <button className="btn btn-secondary btn-sm" onClick={() => setShowBulkInput(true)}>
                            <i className="fas fa-table"></i> 일괄입력
                        </button>
                        <button className="btn btn-primary btn-sm" onClick={() => { setEditItem(null); setShowModal(true); }}>
                            <i className="fas fa-plus"></i> 신규 추가
                        </button>
                    </div>
                </div>
                <div className="card-body">
                    {filtered.length === 0 ? (
                        <div className="empty-state">
                            <i className="fas fa-inbox"></i>
                            <p>재고가 없습니다.</p>
                        </div>
                    ) : (
                        <table>
                            <thead>
                                <tr>
                                    <th>제품코드</th>
                                    <th>제품명</th>
                                    <th>수량</th>
                                    <th>위치</th>
                                    <th>비고</th>
                                    <th>액션</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(item => (
                                    <tr key={item.id}>
                                        <td>{item.code}</td>
                                        <td>{item.name}</td>
                                        <td style={{fontWeight:'600'}}>{fmt(item.qty)}</td>
                                        <td>{item.location}</td>
                                        <td>{item.notes}</td>
                                        <td style={{whiteSpace:'nowrap'}}>
                                            <button className="btn btn-sm btn-secondary" onClick={() => { setEditItem(item); setShowModal(true); }} style={{marginRight:'4px'}}>
                                                <i className="fas fa-edit"></i>
                                            </button>
                                            <button className="btn btn-sm btn-danger" onClick={() => handleDelete(item.id)}>
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                </div>
            </div>

            {showModal && <InventoryModal item={editItem} categories={categories} onSave={handleSave} onClose={() => setShowModal(false)} />}
            {showBulkInput && <BulkInventoryInput category={categoryFilter} onClose={() => setShowBulkInput(false)} />}
        </div>
    );
}

function InventoryModal({ item, categories, onSave, onClose }) {
    const [form, setForm] = useState(item || { category:'완제품', code:'', name:'', qty:0, location:'', notes:'' });

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                    <h3>{item ? '재고 수정' : '재고 추가'}</h3>
                    <button className="btn btn-secondary btn-sm" onClick={onClose}>
                        <i className="fas fa-times"></i>
                    </button>
                </div>
                <div className="modal-body">
                    <div className="form-group">
                        <label>분류</label>
                        <select value={form.category} onChange={(e) => setForm({...form, category: e.target.value})}>
                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>
                    <div className="form-row">
                        <div className="form-group">
                            <label>제품/부품코드</label>
                            <input type="text" value={form.code} onChange={(e) => setForm({...form, code: e.target.value})} placeholder="예: LCDM-1000" />
                        </div>
                        <div className="form-group">
                            <label>제품/부품명</label>
                            <input type="text" value={form.name} onChange={(e) => setForm({...form, name: e.target.value})} placeholder="제품명" />
                        </div>
                    </div>
                    <div className="form-row">
                        <div className="form-group">
                            <label>수량</label>
                            <input type="number" value={form.qty} onChange={(e) => setForm({...form, qty: parseInt(e.target.value) || 0})} />
                        </div>
                        <div className="form-group">
                            <label>위치</label>
                            <input type="text" value={form.location} onChange={(e) => setForm({...form, location: e.target.value})} placeholder="예: A-01" />
                        </div>
                    </div>
                    <div className="form-group">
                        <label>비고</label>
                        <textarea value={form.notes} onChange={(e) => setForm({...form, notes: e.target.value})} />
                    </div>
                </div>
                <div className="modal-footer">
                    <button className="btn btn-secondary" onClick={onClose}>취소</button>
                    <button className="btn btn-primary" onClick={() => onSave(form)}>저장</button>
                </div>
            </div>
        </div>
    );
}

function BulkInventoryInput({ category, onClose }) {
    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                    <h3>{category} 일괄입력</h3>
                    <button className="btn btn-secondary btn-sm" onClick={onClose}>
                        <i className="fas fa-times"></i>
                    </button>
                </div>
                <div className="modal-body">
                    <p style={{color:'var(--gray)', fontSize:'12px', marginBottom:'16px'}}>
                        Excel 파일을 업로드하거나 데이터를 붙여넣기로 입력하세요. 필수 항목: 코드, 제품명, 수량, 위치
                    </p>
                    <div className="upload-zone">
                        <i className="fas fa-cloud-upload-alt"></i>
                        <p>파일을 드래그하거나 클릭하여 업로드</p>

                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>

                        )}
                    </div>
                </div>
            )}

            {showModal && <MoldModal mold={editMold} onSave={handleSaveMold} onClose={() => setShowModal(false)} />}

function OrdersPage({ data, setData }) {
    const [showModal, setShowModal] = useState(false);
    const [editOrder, setEditOrder] = useState(null);
    const [filter, setFilter] = useState('all');
    const [search, setSearch] = useState('');

    const orders = data.orders || [];
    const clients = data.clients || [];

    const filtered = orders.filter(o => {
        if (filter !== 'all' && o.status !== filter) return false;
        return o.orderNo.includes(search) || o.client.includes(search) || o.product.includes(search);
    });

    const handleSave = (order) => {
        if (editOrder) {
            const idx = orders.findIndex(o => o.id === editOrder.id);
            if (idx >= 0) orders[idx] = order;
        } else {
            order.id = genId(data);
            orders.push(order);
        }
        setData({...data});
        setShowModal(false);
        setEditOrder(null);
    };

    const handleDelete = (id) => {
        if (confirm('삭제하시겠습니까?')) {
            const idx = orders.findIndex(o => o.id === id);
            if (idx >= 0) orders.splice(idx, 1);
            setData({...data});
        }
    };

    return (
        <div>
            <h2 style={{fontSize:'20px', fontWeight:'600', marginBottom:'16px'}}>발주확인/처리</h2>

            <div className="card">
                <div className="card-header">
                    <div style={{display:'flex', gap:'8px', alignItems:'center', flex:'1'}}>
                        <input type="text" placeholder="발주번호, 업체, 제품명..." value={search} onChange={(e) => setSearch(e.target.value)} style={{maxWidth:'300px'}} />
                    </div>
                    <button className="btn btn-primary btn-sm" onClick={() => { setEditOrder(null); setShowModal(true); }}>
                        <i className="fas fa-plus"></i> 신규 발주
                    </button>
                </div>
                <div className="card-body">
                    <div style={{marginBottom:'16px', display:'flex', gap:'8px'}}>
                        {['all', '대기', '진행중', '납기초과', '출하완료'].map(s => (
                            <button key={s} className={`btn btn-sm ${filter === s ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter(s)}>
                                {s === 'all' ? '전체' : s}
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 ? (
                        <div className="empty-state">
                            <i className="fas fa-inbox"></i>
                            <p>발주 내역이 없습니다.</p>
                        </div>
                    ) : (
                        <table>
                            <thead>
                                <tr>
                                    <th>발주일</th>
                                    <th>발주번호</th>
                                    <th>업체</th>
                                    <th>제품</th>
                                    <th>수량</th>
                                    <th>납기일</th>
                                    <th>출하일</th>
                                    <th>상태</th>
                                    <th>액션</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(o => (
                                    <tr key={o.id}>
                                        <td>{fmtDate(o.orderDate)}</td>
                                        <td>{o.orderNo}</td>
                                        <td>{o.client}</td>
                                        <td>{o.product}</td>
                                        <td>{fmt(o.qty)}</td>
                                        <td>{fmtDate(o.dueDate)}</td>
                                        <td>{fmtDate(o.shipDate)}</td>
                                        <td>
                                            <span className={`badge ${
                                                o.status === '출하완료' ? 'badge-green' :
                                                o.status === '납기초과' ? 'badge-red' :
                                                o.status === '진행중' ? 'badge-blue' : 'badge-gray'
                                            }`}>{o.status}</span>
                                        </td>
                                        <td style={{whiteSpace:'nowrap'}}>
                                            <button className="btn btn-sm btn-secondary" onClick={() => { setEditOrder(o); setShowModal(true); }} style={{marginRight:'4px'}}>
                                                <i className="fas fa-edit"></i>
                                            </button>
                                            <button className="btn btn-sm btn-danger" onClick={() => handleDelete(o.id)}>
                                                <i className="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    )}
                </div>
            </div>

            {showModal && <OrderModal order={editOrder} clients={clients} onSave={handleSave} onClose={() => setShowModal(false)} />}
        </div>
    );
}

function UserManagementPage({ currentUser }) {
    const [users, setUsersState] = useState(getUsers());
    const [editId, setEditId] = useState(null);
    const [editData, setEditData] = useState({});
    const [showAdd, setShowAdd] = useState(false);
    const [newUser, setNewUser] = useState({ id: '', name: '', role: 'staff', password: '' });
    const [msg, setMsg] = useState('');

    const updateUsers = (updated) => {
        USERS = updated;
        saveUsers(updated);
        setUsersState({...updated});
    };

    const handleEdit = (uid) => {
        setEditId(uid);
        setEditData({ name: users[uid].name, role: users[uid].role, password: '' });
    };

    const handleSave = () => {
        if (!editId) return;
        const updated = {...users};
        updated[editId] = {
            ...updated[editId],
            name: editData.name || updated[editId].name,
            role: editData.role || updated[editId].role,
        };
        if (editData.password && editData.password.trim()) {
            updated[editId].password = editData.password.trim();
        }
        updateUsers(updated);
        setEditId(null);
        setMsg('저장되었습니다.');
        setTimeout(() => setMsg(''), 2000);
    };

    const handleDelete = (uid) => {
        if (uid === currentUser.id) {
            alert('현재 로그인된 계정은 삭제할 수 없습니다.');
            return;
        }
        if (uid === 'kimjs') {
            alert('대표 계정은 삭제할 수 없습니다.');
            return;
        }
        if (!confirm(users[uid].name + ' 계정을 삭제하시겠습니까?')) return;
        const updated = {...users};
        delete updated[uid];
        updateUsers(updated);
    };

    const handleAdd = () => {
        if (!newUser.id || !newUser.name || !newUser.password) {
            alert('모든 항목을 입력해주세요.');
            return;
        }
        if (users[newUser.id]) {
            alert('이미 존재하는 ID입니다.');
            return;
        }
        const updated = {...users};
        updated[newUser.id] = { name: newUser.name, role: newUser.role, password: newUser.password };
        updateUsers(updated);
        setNewUser({ id: '', name: '', role: 'staff', password: '' });
        setShowAdd(false);
        setMsg('새 사용자가 추가되었습니다.');
        setTimeout(() => setMsg(''), 2000);
    };

    const roleLabel = (r) => r === 'admin' ? '관리자' : '일반직원';
    const roleBadge = (r) => r === 'admin' ? 'badge-blue' : 'badge-gray';

    return (
        <div>
            <h2 style={{fontSize:'20px', fontWeight:'600', marginBottom:'16px'}}>사용자 관리</h2>

            {msg && <div style={{background:'var(--secondary-light)', color:'var(--secondary)', padding:'10px 16px', borderRadius:'6px', marginBottom:'16px', fontSize:'13px'}}><i className="fas fa-check-circle"></i> {msg}</div>}

            <div className="card">
                <div className="card-header">
                    <h3>등록된 사용자</h3>
                    <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}>
                        <i className="fas fa-user-plus"></i> 사용자 추가
                    </button>
                </div>
                <div className="card-body">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>이름 (직책)</th>
                                <th>접속권한</th>
                                <th>비밀번호</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            {Object.keys(users).map(uid => (
                                <tr key={uid}>
                                    <td style={{fontWeight:'600'}}>{uid}</td>
                                    <td>
                                        {editId === uid ? (
                                            <input type="text" value={editData.name} onChange={(e) => setEditData({...editData, name: e.target.value})} style={{width:'100%', padding:'4px 8px', fontSize:'13px'}} />
                                        ) : users[uid].name}
                                    </td>
                                    <td>
                                        {editId === uid ? (                            <select value={editData.role} onChange={(e) => setEditData({...editData, role: e.target.value})} style={{padding:'4px 8px', fontSize:'13px'}}>
                                                <option value="admin">관리자</option>
                                                <option value="staff">일반직원</option>
                                            </select>
                                        ) : (
                                            <span className={`badge ${roleBadge(users[uid].role)}`}>{roleLabel(users[uid].role)}</span>
                                        )}
                                    </td>
                                    <td>
                                        {editId === uid ? (
                                            <input type="text" value={editData.password} onChange={(e) => setEditData({...editData, password: e.target.value})} placeholder="변경시 입력" style={{width:'100%', padding:'4px 8px', fontSize:'13px'}} />
                                        ) : '••••'}
                                    </td>
                                    <td>
                                        {editId === uid ? (
                                            <div style={{display:'flex', gap:'4px'}}>
                                                <button className="btn btn-success btn-sm" onClick={handleSave}><i className="fas fa-check"></i></button>
                                                <button className="btn btn-secondary btn-sm" onClick={() => setEditId(null)}><i className="fas fa-times"></i></button>
                                            </div>
                                        ) : (
                                            <div style={{display:'flex', gap:'4px'}}>
                                                <button className="btn btn-secondary btn-sm" onClick={() => handleEdit(uid)}><i className="fas fa-edit"></i></button>
                                                {uid !== 'kimjs' && uid !== currentUser.id && (
                                                    <button className="btn btn-sm" style={{background:'var(--danger-light)', color:'var(--danger)'}} onClick={() => handleDelete(uid)}><i className="fas fa-trash"></i></button>
                                                )}
                                            </div>
                                        )}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>

            <div className="card" style={{marginTop:'16px'}}>
                <div className="card-header"><h3>접속권한 안내</h3></div>
                <div className="card-body" style={{fontSize:'13px'}}>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
                        <div>
                            <div style={{fontWeight:'600', marginBottom:'8px', color:'var(--primary)'}}>
                                <span className="badge badge-blue">관리자</span> 접근 가능 메뉴
                            </div>
                            <div style={{color:'var(--gray)'}}>모든 메뉴 접근 가능 (대시보드, 현금흐름, 재무회계, 사용자관리 포함)</div>
                        </div>
                        <div>
                            <div style={{fontWeight:'600', marginBottom:'8px', color:'var(--gray)'}}>
                                <span className="badge badge-gray">일반직원</span> 접근 가능 메뉴
                            </div>
                            <div style={{color:'var(--gray)'}}>발주확인/처리, 업무지시서, 거래명세서, 재고관리, 거래처관리, 제품관리, 금형/도면관리</div>
                        </div>
                    </div>
                </div>
            </div>

            {showAdd && (
                <div className="modal-overlay" onClick={() => setShowAdd(false)}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>새 사용자 추가</h3>
                            <button className="btn btn-secondary btn-sm" onClick={() => setShowAdd(false)}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="modal-body">
                            <div className="form-group">
                                <label>사용자 ID</label>
                                <input type="text" value={newUser.id} onChange={(e) => setNewUser({...newUser, id: e.target.value})} placeholder="영문 소문자 (예: hongkd)" />
                            </div>
                            <div className="form-group">
                                <label>이름 (직책)</label>
                                <input type="text" value={newUser.name} onChange={(e) => setNewUser({...newUser, name: e.target.value})} placeholder="예: 홍길동 (부장)" />
                            </div>
                            <div className="form-group">
                                <label>접속권한</label>
                                <select value={newUser.role} onChange={(e) => setNewUser({...newUser, role: e.target.value})}>
                                    <option value="staff">일반직원</option>
                                    <option value="admin">관리자</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label>비밀번호</label>
                                <input type="text" value={newUser.password} onChange={(e) => setNewUser({...newUser, password: e.target.value})} placeholder="초기 비밀번호 입력" />
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={() => setShowAdd(false)}>취소</button>
                            <button className="btn btn-primary" onClick={handleAdd}>추가</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

                </div>

                {menuItems.map((item, idx) => {
                    if (!item) return <div key={`section-${idx}`} className="nav-section">기본관리</div>;
                    const canAccess = !item.adminOnly || user.role === 'admin';
                    const isDisabled = !canAccess;
                    return (
                        <div
                            key={item.id}
                            className={`nav-item ${page === item.id ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`}
                            onClick={() => { if (canAccess) setPage(item.id); }}
                        >
                            <i className={`fas ${item.icon}`}></i>
                            <span>{item.label}</span>
                        </div>
                    );
                })}
            </div>

            <div className="main">
                <div className="topbar">
                    <h1>{menuItems.find(m => m && m.id === page)?.label || '대시보드'}</h1>
                    <div className="topbar-right">
                        <div className="topbar-date">{new Date().toLocaleDateString('ko-KR')}</div>
                        <div className="topbar-user">
                            <i className="fas fa-user-circle"></i>
                            <span>{user.name}</span>
                        </div>
                        <button className="btn btn-secondary btn-sm" onClick={handleLogout}>
                            <i className="fas fa-sign-out-alt"></i> 로그아웃
                        </button>
                    </div>
                </div>

                <div className="content">
                    {page === 'dashboard' && <DashboardPage data={data} setPage={setPage} />}
                    {page === 'cashflow' && <CashflowPage data={data} />}
                    {page === 'finance' && <FinancePage data={data} setData={setData} />}
                    {page === 'orders' && <OrdersPage data={data} setData={setData} />}
                    {page === 'statement' && <StatementPage data={data} setData={setData} />}
                    {page === 'inventory' && <InventoryPage data={data} setData={setData} />}
                    {page === 'molds' && <MoldAndDrawingPage data={data} setData={setData} />}
                    {page === 'workorder' && (
                        <div className="card">
                            <div className="card-header"><h3>업무지시서</h3></div>
                            <div className="card-body">
                                <div className="empty-state">
                                    <i className="fas fa-tasks"></i>
                                    <p>업무지시서 기능이 준비 중입니다.</p>
                                </div>
                            </div>
                        </div>
                    )}
                    {page === 'clients' && (
                        <div className="card">
                            <div className="card-header"><h3>거래처관리</h3></div>
                            <div className="card-body">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>거래처명</th>
                                            <th>사업자번호</th>
                                            <th>담당자</th>
                                            <th>유형</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(data.clients || []).map(c => (
                                            <tr key={c.id}>
                                                <td>{c.name}</td>
                                                <td>{c.bizNo}</td>
                                                <td>{c.rep}</td>
                                                <td><span className={`badge ${c.type === '고객사' ? 'badge-blue' : c.type === '공급사' ? 'badge-green' : 'badge-gray'}`}>{c.type}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    {page === 'users' && <UserManagementPage currentUser={user} />}
                    {page === 'products' && (
                        <div className="card">
                            <div className="card-header"><h3>제품관리</h3></div>
                            <div className="card-body">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>제품코드</th>
                                            <th>제품명</th>
                                            <th>원가</th>
                                            <th>판매가</th>
                                            <th>단위</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(data.products || []).map(p => (
                                            <tr key={p.id}>
                                                <td>{p.code}</td>
                                                <td>{p.name}</td>
                                                <td>{fmtW(p.costPrice)}</td>
                                                <td>{fmtW(p.sellPrice)}</td>
                                                <td>{p.unit}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            </div>

            {toast && (
                <div className="toast">{toast}</div>
            )}
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
